services:
  dbapi:
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - "8888:80"
    volumes:
      - ./src:/app
      - ./dbconfigs:/app/apis
    depends_on:
      - mysql
      - redis
    environment:
      - BASE_URL=http://localhost:8888
      - DEPLOYMENT_MODE=single
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=myapp
      - DB_USER=user
      - DB_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_STREAM=dbapi_webhooks
      - REDIS_GROUP=dbapi_webhooks_group
      # - REDIS_PASSWORD=password
      - CONFIGS_DIR=/app/apis
      - DEFAULT_RELATIONSHIPS_PAGE_SIZE=10
      - DEFAULT_PAGE_SIZE=100
      - MAX_PAGE_SIZE=10000
      - CONFIG_API_SECRET=myverysecuresecret
      - CONFIG_API_IPS_ACLS=[{"allow":true,"ip":"0.0.0.0/0"}]
      
  mysql:
    image: mariadb:latest
    environment:
      - MYSQL_DATABASE=myapp
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
      - MYSQL_ROOT_PASSWORD=rootpassword
    volumes:
      - ./.docker_data/mysql:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro

  adminer:
    image: adminer:latest
    ports:
      - "8889:8080"
    environment:
      - ADMINER_DESIGN=pepa-linha
      - ADMINER_DEFAULT_SERVER=mysql
      - ADMINER_DEFAULT_USER=root
      - ADMINER_DEFAULT_PASSWORD=rootpassword
    depends_on:
      - mysql

  redis:
    image: redis:6
    ports:
      - "6379:6379"
    volumes:
      - ./.docker_data/redis:/data

