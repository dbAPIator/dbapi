name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          extensions: json, curl, mysqli
          coverage: none

      - name: Install dependencies
        working-directory: src
        run: composer install --no-interaction --prefer-dist

      - name: Verify dataplane schema entry points
        run: bash scripts/check-dataplane-schema-sync.sh

      - name: Unit tests
        working-directory: src
        run: composer test:unit

  integration:
    runs-on: ubuntu-latest
    needs: unit
    continue-on-error: true
    services:
      mysql:
        image: mariadb:11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: dbapi_dataplane
          MYSQL_USER: dbapi
          MYSQL_PASSWORD: dbapi
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          extensions: json, curl, mysqli
          coverage: none

      - name: Install dependencies
        working-directory: src
        run: composer install --no-interaction --prefer-dist

      - name: Load dataplane schema
        env:
          MYSQL_USER: root
          MYSQL_PASSWORD: root
          MYSQL_HOST: 127.0.0.1
        run: bash scripts/load-dataplane-schema-local.sh

      - name: Prepare test env
        working-directory: src
        run: |
          cp tests/connection.dataplane.example.json tests/connection.json
          cp tests/test.env.dataplane.example tests/test.env

      - name: Integration tests (skip when no live dbAPI server)
        working-directory: src
        run: composer test:integration
