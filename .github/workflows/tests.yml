name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: json, curl, mysqli, yaml
          coverage: none

      - name: Install dependencies
        working-directory: src
        run: composer install --no-interaction --prefer-dist

      - name: Verify dataplane schema entry points
        run: bash scripts/check-dataplane-schema-sync.sh

      - name: Unit tests
        working-directory: src
        run: composer test:unit

  integration:
    runs-on: ubuntu-latest
    needs: unit
    services:
      mysql:
        image: mariadb:11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: dbapi_dataplane
          MYSQL_USER: dbapi
          MYSQL_PASSWORD: dbapi
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: json, curl, mysqli, yaml, mbstring
          coverage: none

      - name: Install dependencies
        working-directory: src
        run: composer install --no-interaction --prefer-dist

      - name: Load dataplane schema
        env:
          MYSQL_USER: root
          MYSQL_PASSWORD: root
          MYSQL_HOST: 127.0.0.1
        run: bash scripts/load-dataplane-schema-local.sh

      - name: Prepare test env
        working-directory: src
        run: |
          cp tests/connection.dataplane.example.json tests/connection.json
          cp tests/test.env.dataplane.example tests/test.env
          sed -i 's|^BASE_URL=.*|BASE_URL=http://127.0.0.1:8080|' tests/test.env

      - name: Start dbAPI server
        working-directory: src
        env:
          CONFIGS_DIR: ${{ runner.temp }}/dbapi-configs
          CONFIG_API_SECRET: myverysecuresecret
          CONFIG_API_IPS_ACLS: '[{"allow":true,"ip":"0.0.0.0/0"}]'
          CI_ENV: development
        run: |
          mkdir -p "$CONFIGS_DIR"
          php -S 127.0.0.1:8080 -t public public/ci-router.php >> /tmp/dbapi-php.log 2>&1 &
          echo $! > /tmp/dbapi-php.pid
          for _ in $(seq 1 30); do
            if curl -sf -H "X-Management-Key: myverysecuresecret" http://127.0.0.1:8080/mgmt/v1/apis >/dev/null; then
              echo "dbAPI is ready"
              exit 0
            fi
            sleep 1
          done
          echo "dbAPI failed to start:" >&2
          tail -20 /tmp/dbapi-php.log >&2 || true
          exit 1

      - name: Integration tests
        working-directory: src
        run: composer test:integration
